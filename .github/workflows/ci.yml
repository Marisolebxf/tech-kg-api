name: Code Quality and Unit Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      GRAPH_DB_BACKEND: trsgraph
      TRSGRAPH_HOST: 127.0.0.1
      TRSGRAPH_PORT: 9669
      TRSGRAPH_USERNAME: root
      TRSGRAPH_PASSWORD: ci_test_password
      TRSGRAPH_SPACE: techkg
      LLM_API_KEY: ${{ secrets.GLM_API_KEY }}
      ZHIPUAI_API_KEY: ${{ secrets.GLM_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Run unit and non-external integration tests
        run: PYTHONPATH=. uv run pytest tests -m "not external" -v
