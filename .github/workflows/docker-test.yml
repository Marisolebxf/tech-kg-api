name: Container Deployment and Integration Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      LLM_API_KEY: ${{ secrets.GLM_API_KEY }}
      ZHIPUAI_API_KEY: ${{ secrets.GLM_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env for docker compose
        run: |
          cat > .env <<EOF
          GRAPH_DB_BACKEND=trsgraph
          TRSGRAPH_HOST=127.0.0.1
          TRSGRAPH_PORT=9669
          TRSGRAPH_USERNAME=root
          TRSGRAPH_PASSWORD=ci_test_password
          TRSGRAPH_SPACE=techkg
          MYSQL_HOST=127.0.0.1
          MYSQL_PORT=3306
          MYSQL_DATABASE=techkg
          MYSQL_USERNAME=root
          MYSQL_PASSWORD=ci_test_password
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          LLM_API_KEY=${LLM_API_KEY}
          ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY}
          LLM_MODEL=glm-5.1
          EOF

      - name: Build Docker image
        run: docker compose build

      - name: Deploy FastAPI
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for FastAPI to start..."
          sleep 20
          docker compose exec -T api python - <<'PY'
          import urllib.request

          response = urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5)
          assert response.read().decode() == '{"status":"ok"}'
          PY

      - name: Run integration tests
        run: docker compose exec -T api env PYTHONPATH=. uv run pytest tests/integration -m "not external" -v

      - name: Tear down
        if: always()
        run: docker compose down
