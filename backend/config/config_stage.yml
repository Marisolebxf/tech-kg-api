app:
  name: tech-kg-api
  env: stage
  debug: false

server:
  host: 0.0.0.0
  port: 8000
  reload: false

mysql:
  host: ${MYSQL_HOST}
  port: ${MYSQL_PORT:3318}
  database: ${MYSQL_DATABASE:gkx}
  username: ${MYSQL_USERNAME}
  password: ${MYSQL_PASSWORD}
  pool_size: 20
  max_overflow: 40

redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT:8379}
  password: ${REDIS_PASSWORD:}
  database: ${REDIS_DATABASE:0}

server_mysql:
  host: ${SERVER_MYSQL_HOST}
  port: ${SERVER_MYSQL_PORT:5306}
  database: ${SERVER_MYSQL_DATABASE:trendAdmin}
  username: ${SERVER_MYSQL_USERNAME:root}
  password: ${SERVER_MYSQL_PASSWORD}

mongo:
  uri: "${MONGO_URI}"
  database: ${MONGO_DATABASE:test}

elasticsearch:
  url: ${ELASTICSEARCH_URL}
  username: ${ELASTICSEARCH_USERNAME:elastic}
  password: "${ELASTICSEARCH_PASSWORD}"

nginx:
  gateway_url: ${NGINX_GATEWAY_URL}

graph_db:
  backend: ${GRAPH_DB_BACKEND:trsgraph}
  host: ${TRSGRAPH_HOST}
  port: ${TRSGRAPH_PORT:9669}
  username: ${TRSGRAPH_USERNAME:root}
  password: ${TRSGRAPH_PASSWORD}
  space: ${TRSGRAPH_SPACE:techkg}
  max_connection_pool_size: ${GRAPH_DB_MAX_CONNECTION_POOL_SIZE:50}
  connection_timeout: ${GRAPH_DB_CONNECTION_TIMEOUT:30}

kafka:
  bootstrap_servers: ${KAFKA_BOOTSTRAP_SERVERS}
  consumer_group: ${KAFKA_CONSUMER_GROUP:techkg}

milvus:
  host: ${MILVUS_HOST}
  port: ${MILVUS_PORT:19530}

llm:
  api_key: ${LLM_API_KEY:${ZHIPUAI_API_KEY}}
  base_url: ${LLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
  model: ${LLM_MODEL:${MODEL:glm-5.1}}

observability:
  service_name: tech-kg-api
  otlp_endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}
  trace_enabled: true

logging:
  level: INFO
  json: true
